<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT.MIA - Hunian Elegan & Properti Premium</title>
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            300: '#FDE047',
                            400: '#F1C40F',
                            500: '#D4AF37', // Premium Gold
                            600: '#AA8C2C',
                            700: '#8A7022',
                        },
                        brown: {
                            700: '#5C4033',
                            800: '#4A3728',
                            900: '#2C1E16',
                        },
                        dark: {
                            100: '#222222',
                            200: '#161616',
                            300: '#0F0F0F',
                            400: '#080808',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 15s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #080808; color: #f3f4f6; overflow-x: hidden; scroll-behavior: smooth; }
        .bg-gradient-gold { background: linear-gradient(135deg, #D4AF37 0%, #AA8C2C 100%); }
        .text-gradient-gold { 
            background: linear-gradient(135deg, #F1C40F 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.18);
        }
        .gold-border-hover:hover {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }

        body, .glass-panel, input, select, textarea, button, p, span, h1, h2, h3, h4, h5, div, a {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease !important;
        }

        /* NEW SLIDE ANIMATIONS FOR MODERN DISCLAIMER MODES */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-slide-in-right {
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* PREMIUM BUTTON SPECIFICATION */
        .btn-primary-gold {
            background: linear-gradient(135deg, #FFE066 0%, #F5C443 50%, #C99A22 100%) !important;
            color: #080808 !important;
            border: 1px solid #FFE066 !important;
            font-weight: 850 !important;
            letter-spacing: 0.05em !important;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.3) !important;
        }
        .btn-primary-gold:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 30px rgba(255, 224, 102, 0.65) !important;
            filter: brightness(1.08) !important;
        }

        .btn-secondary-gold {
            background: rgba(8, 8, 8, 0.9) !important;
            backdrop-filter: blur(10px) !important;
            color: #FFE066 !important;
            border: 2px solid #F5C443 !important;
            font-weight: 850 !important;
            letter-spacing: 0.05em !important;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.75), 0 0 12px rgba(212, 175, 55, 0.2) !important;
        }
        .btn-secondary-gold:hover {
            background: rgba(245, 196, 67, 0.2) !important;
            color: #FFFFFF !important;
            border-color: #FFE066 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 30px rgba(245, 196, 67, 0.4) !important;
        }

        /* LIGHT MODE IMPLEMENTATION OVERRIDES */
        body.theme-light {
            background-color: #FAF9F6 !important;
            color: #1F1610 !important;
        }

        body.theme-light .glass-panel {
            background: rgba(255, 255, 255, 0.97) !important;
            backdrop-filter: blur(25px) !important;
            border: 1px solid rgba(170, 140, 44, 0.25) !important;
            box-shadow: 0 10px 30px rgba(74, 55, 40, 0.06) !important;
            color: #1F1610 !important;
        }

        body.theme-light .text-white { color: #1F1610 !important; }
        body.theme-light .text-gray-200 { color: #2D231B !important; }
        body.theme-light .text-gray-300 { color: #3E3228 !important; }
        body.theme-light .text-gray-400 { color: #5C4C40 !important; }
        body.theme-light .text-gray-500 { color: #7E6C5F !important; }
        body.theme-light .bg-dark-400 { background-color: #FAF9F6 !important; }
        body.theme-light .bg-dark-300 {
            background-color: #F4EFE6 !important;
            border: 1px solid rgba(170, 140, 44, 0.15) !important;
        }
        body.theme-light .bg-dark-200 { background-color: #EAE3D2 !important; }
        body.theme-light .bg-dark-100 { background-color: #DCD2B9 !important; }
        body.theme-light .gold-border { border-color: rgba(170, 140, 44, 0.3) !important; }
        body.theme-light .gold-border-hover:hover {
            border-color: rgba(212, 175, 55, 0.8) !important;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15) !important;
        }

        body.theme-light input, 
        body.theme-light select, 
        body.theme-light textarea {
            background-color: #FFFFFF !important;
            color: #1F1610 !important;
            border: 1px solid rgba(170, 140, 44, 0.35) !important;
        }

        body.theme-light .btn-primary-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #AA8C2C 100%) !important;
            color: #FFFFFF !important;
            border: 1px solid #AA8C2C !important;
            box-shadow: 0 4px 15px rgba(170, 140, 44, 0.35) !important;
        }

        body.theme-light .btn-secondary-gold {
            border: 2px solid #AA8C2C !important;
            color: #AA8C2C !important;
            background-color: rgba(212, 175, 55, 0.05) !important;
        }

        /* TEXT SHADOW ON LIGHT MODE Slogan */
        body.theme-light .hero-text-slogan {
            color: #1F1610 !important;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.9), -1px -1px 1px rgba(255, 255, 255, 0.9), 2px 2px 8px rgba(255,255,255,0.7) !important;
        }
        body.theme-dark .hero-text-slogan {
            color: #FFFFFF !important;
            text-shadow: 0 4px 12px rgba(0,0,0,0.85) !important;
        }
        body.theme-light .hero-overlay {
            background: rgba(250, 249, 246, 0.55) !important;
        }
        body.theme-dark .hero-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 60%, rgba(8,8,8,0.98) 100%) !important;
        }
    </style>
</head>
<body>
    <!-- React Mount Node -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ICON_MAPPING = {
            'kolam renang': 'fa-swimming-pool',
            'gym': 'fa-dumbbell',
            'mushola': 'fa-mosque',
            'taman': 'fa-tree',
            'playground': 'fa-child',
            'security': 'fa-shield-alt',
            'cafe': 'fa-coffee',
            'mini market': 'fa-shopping-cart',
            'jogging': 'fa-running',
            'parkir': 'fa-parking',
            'club house': 'fa-building',
            'laundry': 'fa-tshirt',
            'rooftop': 'fa-city',
            'bbq': 'fa-fire'
        };

        const getAutoIcon = (name) => {
            if (!name) return 'fa-star';
            const cleanName = name.toLowerCase().trim();
            for (const key in ICON_MAPPING) {
                if (cleanName.includes(key)) return ICON_MAPPING[key];
            }
            return 'fa-star';
        };

        const RenderPremiumImage = ({ src, mode, alt, className = '' }) => {
            if (!src) {
                return (
                    <div className={`w-full bg-dark-300 flex items-center justify-center text-gray-500 text-xs font-sans ${className}`}>
                        <i className="far fa-image text-lg mr-1.5 opacity-50"></i> Tanpa Foto
                    </div>
                );
            }

            if (mode === 'auto-fit' || mode === 'Auto Fit / Full Foto') {
                return (
                    <div className={`relative overflow-hidden w-full h-full bg-black/95 flex items-center justify-center ${className}`}>
                        <img src={src} alt="" className="absolute inset-0 w-full h-full object-cover filter blur-2xl opacity-40 scale-125 pointer-events-none" />
                        <img src={src} alt={alt} className="relative z-10 max-w-full max-h-full object-contain" />
                    </div>
                );
            }

            let ratioClass = 'aspect-video';
            if (mode === 'portrait' || mode === 'Portrait 4:5') ratioClass = 'aspect-[4/5]';
            if (mode === 'square' || mode === 'Square 1:1') ratioClass = 'aspect-square';
            if (mode === 'custom' || mode === 'Custom / Bebas') ratioClass = 'aspect-[16/10]';

            return (
                <div className="relative overflow-hidden w-full h-full">
                    <img src={src} alt={alt} className={`${ratioClass} object-cover w-full h-full transition-transform duration-700 hover:scale-105 ${className}`} />
                </div>
            );
        };

        const ImageCropperModal = ({ imageSrc, onCrop, onClose, initialRatio = '16:9', isLogo = false }) => {
            const [ratio, setRatio] = useState(initialRatio);
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [initialTouchDistance, setInitialTouchDistance] = useState(null);
            const [initialZoom, setInitialZoom] = useState(1);
            const [bgWarning, setBgWarning] = useState(false);
            const [removeBgActive, setRemoveBgActive] = useState(true);
            const imageRef = useRef(null);

            // Freeze background scroll
            useEffect(() => {
                const originalOverflow = document.body.style.overflow;
                const originalHeight = document.body.style.height;
                document.body.style.overflow = 'hidden';
                document.body.style.height = '100vh';
                return () => {
                    document.body.style.overflow = originalOverflow;
                    document.body.style.height = originalHeight;
                };
            }, []);

            const handleImageLoad = (e) => {
                if (!isLogo) return;
                try {
                    const img = e.target;
                    const testCanvas = document.createElement('canvas');
                    testCanvas.width = 10;
                    testCanvas.height = 10;
                    const testCtx = testCanvas.getContext('2d');
                    testCtx.drawImage(img, 0, 0, 10, 10);
                    const imgData = testCtx.getImageData(0, 0, 10, 10).data;
                    const corners = [0, 9, 90, 99];
                    let hasSolidBg = false;
                    for (let idx of corners) {
                        const alpha = imgData[idx * 4 + 3];
                        const r = imgData[idx * 4];
                        const g = imgData[idx * 4 + 1];
                        const b = imgData[idx * 4 + 2];
                        if (alpha === 255 && ((r > 230 && g > 230 && b > 230) || (r < 25 && g < 25 && b < 25))) {
                            hasSolidBg = true;
                            break;
                        }
                    }
                    setBgWarning(hasSolidBg);
                } catch (err) {
                    console.warn("CORS/Canvas inspection bypassed", err);
                }
            };

            const handleMouseDown = (e) => {
                e.preventDefault();
                setIsDragging(true);
                setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
            };

            const handleTouchStart = (e) => {
                if (e.touches.length === 1) {
                    setIsDragging(true);
                    setDragStart({ x: e.touches[0].clientX - pan.x, y: e.touches[0].clientY - pan.y });
                } else if (e.touches.length === 2) {
                    setIsDragging(false);
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    setInitialTouchDistance(dist);
                    setInitialZoom(zoom);
                }
            };

            const handleTouchMove = (e) => {
                if (e.cancelable) e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    setPan({ x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y });
                } else if (e.touches.length === 2 && initialTouchDistance) {
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const factor = dist / initialTouchDistance;
                    const nextZoom = Math.min(Math.max(initialZoom * factor, 1), 3.5);
                    setZoom(nextZoom);
                }
            };

            const handleCropSave = () => {
                const img = imageRef.current;
                if (!img) return;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                let targetWidth = 800;
                let targetHeight = 450;

                if (ratio === '1:1') { targetWidth = 600; targetHeight = 600; }
                else if (ratio === '4:5') { targetWidth = 480; targetHeight = 600; }
                else if (ratio === 'auto') { targetWidth = img.naturalWidth; targetHeight = img.naturalHeight; }
                else if (ratio === 'free') { targetWidth = img.naturalWidth; targetHeight = img.naturalHeight; }

                canvas.width = targetWidth;
                canvas.height = targetHeight;

                if (isLogo || removeBgActive) {
                    ctx.clearRect(0, 0, targetWidth, targetHeight);
                } else {
                    ctx.fillStyle = "#000000";
                    ctx.fillRect(0, 0, targetWidth, targetHeight);
                }

                const aspectImg = img.naturalWidth / img.naturalHeight;
                const aspectTarget = targetWidth / targetHeight;

                let drawWidth, drawHeight;
                if (ratio === 'auto') {
                    drawWidth = targetWidth;
                    drawHeight = targetHeight;
                } else if (aspectImg > aspectTarget) {
                    drawHeight = targetHeight * zoom;
                    drawWidth = drawHeight * aspectImg;
                } else {
                    drawWidth = targetWidth * zoom;
                    drawHeight = drawWidth / aspectImg;
                }

                const dx = ratio === 'auto' ? 0 : (targetWidth - drawWidth) / 2 + pan.x;
                const dy = ratio === 'auto' ? 0 : (targetHeight - drawHeight) / 2 + pan.y;

                ctx.drawImage(img, dx, dy, drawWidth, drawHeight);

                if (isLogo && removeBgActive) {
                    const imgData = ctx.getImageData(0, 0, targetWidth, targetHeight);
                    const data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i+1];
                        const b = data[i+2];
                        if (r > 230 && g > 230 && b > 230) {
                            data[i+3] = 0; 
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                }

                const croppedBase64 = canvas.toDataURL(isLogo ? 'image/png' : 'image/jpeg', isLogo ? 1.0 : 0.85);
                onCrop(croppedBase64);
                onClose();
            };

            return ReactDOM.createPortal(
                <div className="fixed inset-0 flex items-center justify-center z-[99999] px-4 py-6 font-sans">
                    <div className="fixed inset-0 bg-black/85 backdrop-blur-md pointer-events-none"></div>
                    <div className="glass-panel rounded-2xl p-4 md:p-6 max-w-lg w-full border border-gold-500/30 relative z-[99999] flex flex-col max-h-[90vh] overflow-hidden shadow-2xl">
                        <div className="flex justify-between items-center border-b border-gold-500/10 pb-3 shrink-0">
                            <h4 className="font-serif text-xs md:text-sm font-bold text-gold-500 tracking-wider uppercase">Photo Crop & Editor</h4>
                            <button onClick={onClose} className="text-gray-400 hover:text-white p-1">
                                <i className="fas fa-times text-sm"></i>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto my-4 pr-1 space-y-4">
                            {isLogo && bgWarning && (
                                <div className="bg-amber-500/10 border border-amber-500/30 p-3 rounded-lg text-amber-500 text-[10px] space-y-1.5 leading-relaxed">
                                    <p className="font-bold flex items-center gap-1"><i className="fas fa-exclamation-triangle"></i> Background Terdeteksi</p>
                                    <p>Gunakan logo transparan agar tampilan lebih profesional.</p>
                                    <label className="flex items-center gap-1.5 mt-1 cursor-pointer">
                                        <input type="checkbox" checked={removeBgActive} onChange={(e) => setRemoveBgActive(e.target.checked)} className="accent-gold-500" />
                                        <span>Coba hapus background putih otomatis</span>
                                    </label>
                                </div>
                            )}

                            <div className="relative overflow-hidden border border-gold-500/20 rounded-lg bg-dark-400 flex items-center justify-center cursor-move"
                                style={{ width: '100%', height: '260px', touchAction: 'none' }}
                                onMouseDown={handleMouseDown}
                                onMouseMove={handleMouseMove}
                                onMouseUp={() => setIsDragging(false)}
                                onMouseLeave={() => setIsDragging(false)}
                                onTouchStart={handleTouchStart}
                                onTouchMove={handleTouchMove}
                                onTouchEnd={() => setIsDragging(false)}
                            >
                                <div className={`absolute border-2 border-dashed border-gold-500/60 pointer-events-none z-20 shadow-[0_0_0_9999px_rgba(0,0,0,0.7)] rounded ${
                                    ratio === '1:1' ? 'w-48 h-48 md:w-56 md:h-56' : ratio === '4:5' ? 'w-44 h-56 md:w-48 md:h-60' : ratio === 'auto' ? 'w-[92%] h-[92%] border-solid' : 'w-64 h-36 md:w-72 md:h-40'
                                }`}></div>
                                <img ref={imageRef} src={imageSrc} alt="Source" onLoad={handleImageLoad} className="max-w-none select-none pointer-events-none"
                                    style={{
                                        transform: ratio === 'auto' ? 'none' : `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`,
                                        width: ratio === 'auto' ? '90%' : '80%',
                                        height: ratio === 'auto' ? '90%' : 'auto',
                                        objectFit: ratio === 'auto' ? 'contain' : 'fill'
                                    }}
                                />
                            </div>

                            <div className="flex gap-1.5 justify-center flex-wrap">
                                {[
                                    { id: '16:9', label: 'Landscape' },
                                    { id: '4:5', label: 'Portrait' },
                                    { id: '1:1', label: 'Square' },
                                    { id: 'auto', label: 'Auto Fit' },
                                    { id: 'free', label: 'Bebas' }
                                ].map(r => (
                                    <button key={r.id} type="button" onClick={() => { setRatio(r.id); setPan({ x: 0, y: 0 }); setZoom(1); }}
                                        className={`py-1 px-2 rounded text-[9px] font-bold tracking-wider uppercase border transition-all ${
                                            ratio === r.id ? 'bg-gold-500 text-dark-400 border-gold-500' : 'bg-dark-300 text-gray-400 border-gold-500/10 hover:border-gold-500/30'
                                        }`}
                                    >
                                        {r.label}
                                    </button>
                                ))}
                            </div>

                            {ratio !== 'auto' && (
                                <div className="space-y-3 bg-dark-300 p-3 rounded-lg border border-gold-500/5 text-xs">
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[9px] text-gray-400 uppercase tracking-widest">
                                            <span>Zoom</span>
                                            <span className="font-bold text-gold-500">{zoom.toFixed(2)}x</span>
                                        </div>
                                        <input type="range" min="1" max="3.5" step="0.05" value={zoom} onChange={(e) => setZoom(parseFloat(e.target.value))} className="w-full accent-gold-500 h-1 bg-dark-200" />
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[9px] text-gray-400 uppercase tracking-widest">
                                            <span>Geser Horizontal</span>
                                            <span className="font-bold text-gold-500">{pan.x}px</span>
                                        </div>
                                        <input type="range" min="-300" max="300" step="1" value={pan.x} onChange={(e) => setPan(prev => ({ ...prev, x: parseInt(e.target.value) }))} className="w-full accent-gold-500 h-1 bg-dark-200" />
                                    </div>
                                    <div className="space-y-1">
                                        <div className="flex justify-between text-[9px] text-gray-400 uppercase tracking-widest">
                                            <span>Geser Vertikal</span>
                                            <span className="font-bold text-gold-500">{pan.y}px</span>
                                        </div>
                                        <input type="range" min="-300" max="300" step="1" value={pan.y} onChange={(e) => setPan(prev => ({ ...prev, y: parseInt(e.target.value) }))} className="w-full accent-gold-500 h-1 bg-dark-200" />
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-3 gap-2 shrink-0 border-t border-gold-500/10 pt-3 text-[10px] font-bold uppercase">
                            <button type="button" onClick={onClose} className="bg-dark-100 hover:bg-dark-200 border border-gray-700 text-gray-300 py-2 rounded-lg">Batal</button>
                            <button type="button" onClick={() => { setZoom(1); setPan({ x: 0, y: 0 }); }} className="bg-dark-100 hover:bg-dark-200 border border-gray-700 text-gray-300 py-2 rounded-lg">Reset</button>
                            <button type="button" onClick={handleCropSave} className="bg-gradient-gold text-dark-400 py-2 rounded-lg">Simpan</button>
                        </div>
                    </div>
                </div>,
                document.body
            );
        };

        const Input = ({ label, type = 'text', name, value, onChange, placeholder, required = false, options = [], rows = 3, defaultValue }) => {
            const inputClass = "w-full bg-dark-300 border border-gold-500/20 rounded-lg py-2.5 px-4 text-white placeholder-gray-500 focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-all font-sans text-sm";
            return (
                <div className="space-y-1.5 w-full">
                    {label && <label className="block text-xs font-semibold text-gold-500 tracking-wider uppercase font-sans">{label}</label>}
                    {type === 'textarea' ? (

        const ImageUpload = ({ onImageSelected, currentImage, labelPreset = 'Pilih File', isLogo = false }) => {
            const [dragActive, setDragActive] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const [cropperSource, setCropperSource] = useState(null);
            const fileInputRef = useRef(null);

            const handleFile = (file) => {
                if (!file) return;
                const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
                if (!allowedTypes.includes(file.type)) {
                    alert('Hanya diperbolehkan format JPG, PNG, atau WEBP.');
                    return;
                }
                if (file.size > 10 * 1024 * 1024) {
                    alert('Maksimal ukuran file adalah 10MB.');
                    return;
                }

                setIsUploading(true);
                setUploadProgress(20);

                const reader = new FileReader();
                reader.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 40) + 20;
                        setUploadProgress(percent);
                    }
                };
                reader.onloadend = () => {
                    setUploadProgress(100);
                    setTimeout(() => {
                        setCropperSource(reader.result);
                        setIsUploading(false);
                        setUploadProgress(0);
                    }, 300);
                };
                reader.readAsDataURL(file);
            };

            return (
                <div 
                    onDragEnter={() => setDragActive(true)}
                    onDragOver={(e) => { e.preventDefault(); setDragActive(true); }}
                    onDrop={(e) => { e.preventDefault(); setDragActive(false); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
                    className={`w-full bg-dark-300 border-2 border-dashed rounded-xl p-4 transition-all flex flex-col items-center justify-center text-center relative ${
                        dragActive ? 'border-gold-500 bg-gold-500/5' : 'border-gold-500/20 hover:border-gold-500/40'
                    }`}
                >
                    {cropperSource && (
                        <ImageCropperModal imageSrc={cropperSource} onCrop={(croppedImg) => onImageSelected(croppedImg)} onClose={() => setCropperSource(null)} isLogo={isLogo} />
                    )}

                    {currentImage ? (
                        <div className="w-full space-y-3">

                                <img src={currentImage} alt="Preview" className="max-h-full max-w-full object-contain" />
                            </div>
                            <div className="flex gap-2 justify-center">
                                <button type="button" onClick={() => fileInputRef.current.click()} className="bg-gold-500 text-dark-400 py-1.5 px-3 rounded text-[10px] uppercase font-bold hover:scale-105 transition-transform font-sans">
                                    Pilih File
                                </button>
                                <button type="button" onClick={() => onImageSelected(null)} className="bg-red-500 text-white py-1.5 px-3 rounded text-[10px] uppercase font-bold hover:scale-105 transition-transform font-sans">
                                    Hapus
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="py-4 space-y-2 w-full flex flex-col items-center">
                            <i className="fas fa-file-image text-3xl text-gold-500/60"></i>
                            <p className="text-xs text-gray-400 font-sans">Seret & taruh file di sini atau pilih tombol di bawah (Max 10MB)</p>
                            <button type="button" onClick={() => fileInputRef.current.click()} className="bg-gradient-gold text-dark-400 font-bold py-2 px-4 rounded-lg text-[10px] uppercase tracking-wider transition-all font-sans">
                                {labelPreset}
                            </button>

                            </div>

                        </div>
                    )}

        const DisclaimerContainer = ({ area, appState, onDismissed }) => {
            const [dismissedList, setDismissedList] = useState(() => {
                const saved = sessionStorage.getItem('pt_mia_dismissed_disclaimers');
                return saved ? JSON.parse(saved) : {};
            });

            const activeDisclaimers = (appState.disclaimers || []).filter(d => d.active && d.area === area);

            const handleDismiss = (id, version) => {
                const nextDismissed = { ...dismissedList, [id]: version };
                setDismissedList(nextDismissed);
                sessionStorage.setItem('pt_mia_dismissed_disclaimers', JSON.stringify(nextDismissed));
                if (onDismissed) onDismissed(id);
            };

            // Freeze background scroll if any popup disclaimer is active and not dismissed yet
            useEffect(() => {
                const pendingPopups = activeDisclaimers.filter(d => d.mode === 'popup' && dismissedList[d.id] !== d.version);
                if (pendingPopups.length > 0) {
                    document.body.style.overflow = 'hidden';
                    document.body.style.height = '100vh';
                } else {
                    document.body.style.overflow = '';
                    document.body.style.height = '';
                }
                return () => {
                    document.body.style.overflow = '';
                    document.body.style.height = '';
                };
            }, [activeDisclaimers, dismissedList]);

            if (activeDisclaimers.length === 0) return null;

            return (

                        if (dismissedList[disc.id] === disc.version) return null;

                        const colorStyle = { color: disc.color || '#D4AF37' };

            const [userSession, setUserSession] = useState(() => {
                const saved = localStorage.getItem('pt_mia_user_session_v13_secure');
                if (!saved) return null;
                try {
                    const parsed = JSON.parse(saved);
                    if (!parsed.expiresAt || parsed.expiresAt <= Date.now()) return null;
                    return parsed;
                } catch (e) {
                    return null;
                }
            });

            useEffect(() => {
                if (userSession) {
                    localStorage.setItem('pt_mia_user_session_v13_secure', JSON.stringify(userSession));
                } else {
                    localStorage.removeItem('pt_mia_user_session_v13_secure');
                    localStorage.removeItem('pt_mia_user_session_v12_ultimate');
                }
            }, [userSession]);

            useEffect(() => {
                const syncFromStorage = (e) => {
                    if (e.key === 'pt_mia_state_v12_ultimate' && e.newValue) {
                        try { setAppState(JSON.parse(e.newValue)); } catch (err) { console.warn('Gagal sinkron state realtime', err); }
                    }
                    if (e.key === 'pt_mia_consumer_sessions_v13_secure' && e.newValue) {
                        try { setConsumerSessions(JSON.parse(e.newValue)); } catch (err) { console.warn('Gagal sinkron session', err); }
                    }
                    if (e.key === 'pt_mia_custom_product_requests_v13' && e.newValue) {
                        try { setCustomRequests(JSON.parse(e.newValue)); } catch (err) { console.warn('Gagal sinkron custom request', err); }
                    }
                };
                window.addEventListener('storage', syncFromStorage);
                return () => window.removeEventListener('storage', syncFromStorage);
            }, []);

            useEffect(() => {
                const checkSession = () => {
                    const now = Date.now();
                    setConsumerSessions(prev => prev.map(s => (s.status === 'online' && s.expiresAt <= now) ? { ...s, status: 'offline', online: false, logoutAt: new Date().toISOString(), logoutReason: 'Session habis otomatis' } : s));
                    if (userSession && userSession.expiresAt <= now) {
                        setUserSession(null);
                        triggerAlert('Session login konsumen habis. Silakan login ulang.', 'error');
                    }
                };
                checkSession();
                const timer = setInterval(checkSession, 60000);
                return () => clearInterval(timer);
            }, [userSession]);

            useEffect(() => {
                if (!userSession || consumerSessions.length === 0) return;
                const cleanPhone = normalizePhoneNumber(userSession.phone);
                const active = consumerSessions.find(s => s.phone === cleanPhone && s.deviceId === deviceId && s.status === 'online' && s.expiresAt > Date.now());
                if (!active) {
                    setUserSession(null);
                    triggerAlert('Session konsumen sudah logout atau dihentikan operator.', 'error');
                }
            }, [consumerSessions]);

            const handleConsumerLoginSuccess = (session) => {
                const cleanPhone = normalizePhoneNumber(session.phone);
                const finalSession = {
                    ...session,
                    phone: cleanPhone,
                    displayPhone: displayPhoneNumber(cleanPhone),
                    deviceId,
                    deviceName: getDeviceName(),
                    status: 'online',
                    online: true,
                    lastLogin: new Date().toISOString(),
                    expiresAt: Date.now() + SESSION_DURATION_MS
                };
                setConsumerSessions(prev => {
                    const offlineOld = prev.map(s => (s.phone === cleanPhone && s.deviceId === deviceId) ? { ...s, status: 'offline', online: false } : s);
                    return [finalSession, ...offlineOld].slice(0, 120);
                });
                setUserSession(finalSession);
                triggerAlert('Login konsumen berhasil. Perangkat ini sudah terverifikasi.');
            };

            const handleConsumerLogout = (phoneOverride = null, forced = false) => {
                const cleanPhone = normalizePhoneNumber(phoneOverride || userSession?.phone || '');
                if (!cleanPhone) return;
                setConsumerSessions(prev => prev.map(s => (
                    s.phone === cleanPhone && (forced || s.deviceId === deviceId)
                ) ? { ...s, status: 'offline', online: false, logoutAt: new Date().toISOString(), logoutReason: forced ? 'Logout paksa operator' : 'Logout konsumen' } : s));
                if (!phoneOverride || normalizePhoneNumber(userSession?.phone || '') === cleanPhone) {
                    setUserSession(null);
                }
                triggerAlert(forced ? 'Konsumen berhasil dilogout paksa.' : 'Logout konsumen berhasil.');
            };

            // Cart state for MIAMART
            const [miamartCart, setMiamartCart] = useState([]);

            const [view, setView] = useState('home'); 
            const [selectedComplexId, setSelectedComplexId] = useState(null);
            const [selectedHouse, setSelectedHouse] = useState(null);
            const [roomConfig, setRoomConfig] = useState({
                bedroomQty: 2,
                bathroomQty: 1,
                extraRooms: []
            });
            const [roomSlotSelections, setRoomSlotSelections] = useState({});

            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [dashboardTab, setDashboardTab] = useState('requests');
            const [modal, setModal] = useState(null);
            const [confirmPopup, setConfirmPopup] = useState(null);

            const triggerAlert = (message, type = 'success') => setModal({ message, type });
            const triggerConfirm = (message, onConfirm) => setConfirmPopup({ message, onConfirm: () => { onConfirm(); setConfirmPopup(null); }, onCancel: () => setConfirmPopup(null) });

            const handleLogout = () => {
                setIsAdmin(false);
                setView('home');
                setAdminPasswordInput('');
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPasswordInput === appState.adminPassword) {
                    setIsAdmin(true);
                    setView('admin-dashboard');
                    triggerAlert('Login Operator berhasil.');
                } else {
                    triggerAlert('Password operator salah', 'error');
                }
            };

            const toggleTheme = () => {
                setTheme(prev => prev === 'dark' ? 'light' : 'dark');
            };

            // Dynamic SOLD OUT computation per complex
            const isComplexSoldOut = (complexId) => {
                const comp = appState.complexes.find(c => c.id === complexId);
                if (!comp) return false;
                return parseInt(comp.plotsAvailable || 0) === 0;
            };

            const hasCustomizations = roomConfig.extraRooms.length > 0 || Object.values(roomSlotSelections).some(sel => sel.method === 'operator');

            return (
                <div className="flex flex-col min-h-screen text-gray-200">
                    {modal && <CustomAlert message={modal.message} type={modal.type} onClose={() => setModal(null)} />}
                    {confirmPopup && <CustomConfirm message={confirmPopup.message} onConfirm={confirmPopup.onConfirm} onCancel={confirmPopup.onCancel} />}

                    {view !== 'admin-dashboard' && (
                        <header className="sticky top-0 z-50 glass-panel border-b border-gold-500/10 px-4 py-3 md:py-4">
                            <div className="max-w-7xl mx-auto flex justify-between items-center flex-wrap gap-4 md:gap-0">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                    <BrandingLogoText 
                                        logo={appState.logo}
                                        textSpacing={appState.brandingSpacing}
                                        logoSize={appState.brandingLogoSize}
                                        brandColor={appState.brandingColor}
                                        customFont={appState.brandingFont}
                                        customSize={appState.brandingSize}
                                    />
                                </div>
                                <nav className="flex items-center gap-4 md:gap-6 text-[11px] font-semibold tracking-wider text-gray-300 uppercase font-sans overflow-x-auto hide-scrollbar max-w-full">
                                    <button onClick={() => setView('home')} className={`hover:text-gold-500 transition-colors whitespace-nowrap ${view === 'home' ? 'text-gold-500 font-bold' : ''}`}>Beranda</button>
                                    <button onClick={() => setView('complex-list')} className={`hover:text-gold-500 transition-colors whitespace-nowrap ${view === 'complex-list' || view === 'complex-detail' ? 'text-gold-500 font-bold' : ''}`}>Komplek</button>
                                    
                                    {appState.marketplaceEnabled && (
                                        <button onClick={() => setView('marketplace')} className={`hover:text-gold-500 transition-colors whitespace-nowrap ${view === 'marketplace' ? 'text-gold-500 font-bold' : ''}`}>
                                            <i className="fas fa-couch mr-1"></i> {appState.marketplaceName || 'Interior'}
                                        </button>
                                    )}

                                    {appState.miamartEnabled && (
                                        <button onClick={() => setView('miamart')} className={`hover:text-gold-500 transition-colors whitespace-nowrap ${view === 'miamart' ? 'text-gold-500 font-bold' : ''}`}>
                                            <i className="fas fa-store mr-1"></i> {appState.miamartName}
                                        </button>
                                    )}

                                    <button onClick={() => setView('about')} className={`hover:text-gold-500 transition-colors whitespace-nowrap ${view === 'about' ? 'text-gold-500 font-bold' : ''}`}>Tentang Kami</button>
                                    <button onClick={() => setView('contact')} className={`hover:text-gold-500 transition-colors whitespace-nowrap ${view === 'contact' ? 'text-gold-500 font-bold' : ''}`}>Contact</button>
                                </nav>
                                <div className="flex items-center gap-3">
                                    <button 
                                        onClick={toggleTheme} 
                                        className="gold-border text-gold-500 hover:text-white hover:bg-gold-500/10 w-8 h-8 rounded-lg flex items-center justify-center transition-all text-xs shadow-[0_0_15px_rgba(212,175,55,0.1)] duration-300"
                                        title={theme === 'dark' ? 'Aktifkan Mode Terang' : 'Aktifkan Mode Gelap'}
                                    >
                                        <i className={`fas ${theme === 'dark' ? 'fa-sun' : 'fa-moon'}`}></i>
                                    </button>

                                    {userSession ? (
                                        <div className="hidden lg:flex items-center gap-2 bg-gold-500/10 border border-gold-500/20 px-3 py-1.5 rounded-lg text-xs font-semibold text-gold-500 font-sans">
                                            <i className="fas fa-user-circle"></i>
                                            <span>{userSession.name}</span>
                                            <button onClick={() => handleConsumerLogout()} className="ml-1 text-red-400 hover:text-white" title="Logout Konsumen">
                                                <i className="fas fa-sign-out-alt"></i>
                                            </button>
                                        </div>
                                    ) : (
                                        <button onClick={() => setView('consumer-login')} className="gold-border text-gold-500 hover:text-white hover:bg-gold-500/10 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all font-sans">
                                            <i className="fab fa-whatsapp mr-1"></i> Login Konsumen
                                        </button>
                                    )}
                                    <button onClick={() => setView(isAdmin ? 'admin-dashboard' : 'admin-login')} className="gold-border text-gold-500 hover:text-white hover:bg-gold-500/10 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all font-sans">
                                        <i className="fas fa-user-shield mr-1"></i> {isAdmin ? 'Dashboard' : 'Admin'}
                                    </button>
                                </div>
                            </div>
                        </header>
                    )}

                    <main className="flex-1">
                        {}
                        {view === 'home' && (
                            <div>
                                <DisclaimerContainer area="beranda" appState={appState} />
                                <HomeView appState={appState} setView={setView} requests={requests} userSession={userSession} isComplexSoldOut={isComplexSoldOut} setSelectedComplexId={setSelectedComplexId} />
                            </div>
                        )}
                        {view === 'complex-list' && (
                            <div>
                                <DisclaimerContainer area="komplek" appState={appState} />
                                <ComplexListView appState={appState} setView={setView} setSelectedComplexId={setSelectedComplexId} isComplexSoldOut={isComplexSoldOut} />
                            </div>
                        )}
                        {view === 'complex-detail' && (
                            <div>
                                <DisclaimerContainer area="komplek" appState={appState} />
                                <ComplexDetailView 
                                    appState={appState} 
                                    complexId={selectedComplexId} 
                                    onSelectHouse={(house) => { setSelectedHouse(house); setView('select-house'); }} 
                                    onBack={() => setView('complex-list')} 
                                />
                            </div>
                        )}
                        {view === 'select-house' && selectedHouse && (
                            <div>
                                <DisclaimerContainer area="rumah" appState={appState} />
                                <HouseDetailView 
                                    house={selectedHouse} 
                                    roomConfig={roomConfig} 
                                    setRoomConfig={setRoomConfig} 
                                    appState={appState}
                                    onBack={() => setView('complex-detail')} 
                                    onNext={() => { setRoomSlotSelections({}); setView('design-room'); }} 
                                    hasCustomizations={hasCustomizations}
                                    Disclaimer={DisclaimerContainer}
                                />
                            </div>
                        )}
                        {view === 'design-room' && selectedHouse && (
                            <div>
                                <DisclaimerContainer area="desain-ruangan" appState={appState} />
                                <DesignRoomSelectionView 
                                    house={selectedHouse}
                                    roomConfig={roomConfig}
                                    roomSlotSelections={roomSlotSelections}
                                    setRoomSlotSelections={setRoomSlotSelections}
                                    appState={appState}
                                    userSession={userSession}
                                    setUserSession={setUserSession}
                                    requests={requests}
                                    setRequests={setRequests}
                                    onBack={() => setView('select-house')}
                                    setView={setView}
                                    triggerAlert={triggerAlert}
                                    triggerConfirm={triggerConfirm}
                                    hasCustomizations={hasCustomizations}
                                    Disclaimer={DisclaimerContainer}
                                />
                            </div>
                        )}
                        
                        {view === 'marketplace' && (
                            <div>
                                <DisclaimerContainer area="marketplace" appState={appState} />
                                <MarketplaceView 
                                    appState={appState} 
                                    userSession={userSession} 
                                    triggerAlert={triggerAlert}
                                    setCustomRequests={setCustomRequests}
                                    setView={setView}
                                />
                            </div>
                        )}

                        {view === 'miamart' && (
                            <div>
                                <DisclaimerContainer area="miamart" appState={appState} />
                                <MiamartView 
                                    appState={appState} 
                                    cart={miamartCart} 
                                    setCart={setMiamartCart} 
                                    userSession={userSession} 
                                    triggerAlert={triggerAlert}
                                    setView={setView}
                                />
                            </div>
                        )}

                        {view === 'about' && (
                            <div>
                                <DisclaimerContainer area="tentang-kami" appState={appState} />
                                <AboutView appState={appState} />
                            </div>
                        )}
                        {view === 'contact' && (
                            <div>
                                <DisclaimerContainer area="contact" appState={appState} />
                                <ContactView appState={appState} triggerAlert={triggerAlert} />
                            </div>
                        )}
                        {view === 'consumer-login' && (
                            <ConsumerLoginView
                                appState={appState}
                                userSession={userSession}
                                consumerSessions={consumerSessions}
                                deviceId={deviceId}
                                onLoginSuccess={handleConsumerLoginSuccess}
                                onLogout={handleConsumerLogout}
                                onBack={() => setView('home')}
                                triggerAlert={triggerAlert}
                            />
                        )}
                        {view === 'admin-login' && (
                            <AdminLoginView 
                                adminPasswordInput={adminPasswordInput} 
                                setAdminPasswordInput={setAdminPasswordInput} 
                                showPassword={showPassword} 
                                setShowPassword={setShowPassword} 
                                onLogin={handleAdminLogin} 
                            />
                        )}
                        {view === 'admin-dashboard' && (
                            <OperatorDashboardView 
                                appState={appState} 
                                setAppState={setAppState} 
                                requests={requests} 
                                setRequests={setRequests} 
                                dashboardTab={dashboardTab} 
                                setDashboardTab={setDashboardTab} 
                                handleLogout={handleLogout} 
                                triggerAlert={triggerAlert} 
                                triggerConfirm={triggerConfirm} 
                                setTheme={setTheme}
                                consumerSessions={consumerSessions}
                                setConsumerSessions={setConsumerSessions}
                                handleConsumerLogout={handleConsumerLogout}
                                customRequests={customRequests}
                                setCustomRequests={setCustomRequests}
                            />
                        )}
                    </main>

                    {view !== 'admin-dashboard' && (
                        <footer className="glass-panel border-t border-gold-500/10 py-12 px-4 mt-auto">
                            <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="space-y-4">
                                    <BrandingLogoText 
                                        logo={appState.logo}
                                        textSpacing={appState.brandingSpacing}
                                        logoSize={appState.brandingLogoSize}
                                        brandColor={appState.brandingColor}
                                        customFont={appState.brandingFont}
                                        customSize={appState.brandingSize}
                                    />
                                    <p className="text-gray-400 text-xs max-w-sm font-sans">{appState.slogan}</p>
                                </div>
                                <div className="space-y-4 font-sans">
                                    <h4 className="font-serif text-sm font-bold text-gold-500 uppercase tracking-widest">Menu</h4>
                                    <ul className="space-y-2 text-xs text-gray-400">
                                        <li><button onClick={() => setView('home')} className="hover:text-gold-500 transition-all">Beranda</button></li>
                                        <li><button onClick={() => setView('complex-list')} className="hover:text-gold-500 transition-all">Komplek</button></li>
                                        <li><button onClick={() => setView('about')} className="hover:text-gold-500 transition-all">Tentang Kami</button></li>
                                        <li><button onClick={() => setView('contact')} className="hover:text-gold-500 transition-all">Contact</button></li>
                                    </ul>
                                </div>
                                <div className="space-y-4 bg-dark-300 p-5 rounded-xl border border-gold-500/10 font-sans">
                                    <h5 className="font-serif text-sm font-bold text-white">Ikuti Media Sosial Resmi</h5>
                                    <div className="flex flex-wrap gap-3">
                                        {appState.socials && appState.socials.filter(s => s.active).map(soc => (
                                            <SocialMediaButton key={soc.id} social={soc} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </footer>
                    )}
                </div>
            );
        }

        function HomeView({ appState, setView, requests, userSession, isComplexSoldOut, setSelectedComplexId }) {
            const userRequests = userSession ? requests.filter(r => r.customerPhone === userSession.phone) : [];

            return (
                <div className="space-y-16 pb-16 animate-fade-in">
                    {/* Hero Banner Section */}
                    <section className="relative min-h-[85vh] flex items-center justify-center px-4 overflow-hidden">
                        <div className="absolute inset-0">
                            <img src={appState.heroImage} className="w-full h-full object-cover filter brightness-[0.35]" alt="Hero" />
                            <div className="absolute inset-0 hero-overlay"></div>
                        </div>
                        <div className="relative z-10 max-w-4xl mx-auto text-center space-y-6 md:space-y-8 p-4">
                            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full text-[10px] font-bold tracking-widest uppercase bg-gold-500/10 border border-gold-500/30 text-gold-300 font-sans">
                                <i className="fas fa-crown"></i> Developer Properti Premium
                            </div>
                            <h1 className="font-serif text-4xl md:text-6xl lg:text-7xl font-bold leading-tight drop-shadow-lg hero-text-slogan">{appState.slogan}</h1>
                            <div className="flex flex-col sm:flex-row justify-center gap-4 pt-4 font-sans">
                                <button onClick={() => setView('complex-list')} className="btn-primary-gold py-3.5 px-8 rounded-lg text-xs uppercase transition-all font-bold tracking-wider">
                                    Lihat Komplek
                                </button>
                                <button onClick={() => setView('contact')} className="btn-secondary-gold py-3.5 px-8 rounded-lg transition-all text-xs uppercase font-bold tracking-wider">
                                    Konsultasi Sekarang
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* Active Requests Tracking */}
                    {userSession && (
                        <section className="max-w-7xl mx-auto px-4">
                            <div className="glass-panel rounded-2xl p-6 md:p-8 space-y-6 border border-gold-500/20 shadow-2xl">
                                <h3 className="font-serif text-2xl font-bold text-gold-500">Pusat Riwayat & Request Anda</h3>
                                {userRequests.length === 0 ? (
                                    <p className="text-sm text-gray-400 font-sans">Belum ada request perencanaan yang dikirim.</p>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 font-sans">
                                        {userRequests.map(req => (
                                            <div key={req.id} className="bg-dark-300 p-5 rounded-xl border border-gold-500/10">
                                                <div className="flex justify-between items-center text-[10px] text-gray-500 mb-2">
                                                    <span>{req.date}</span>
                                                    <span className="font-bold text-gold-500">{req.id}</span>
                                                </div>
                                                <h4 className="font-serif text-base font-semibold text-white mb-1">{req.houseName}</h4>
                                                <p className="text-xs text-gray-400 mb-3">
                                                    Spesifikasi: {req.spec?.bedrooms || 0} Bed, {req.spec?.bathrooms || 0} Bath
                                                </p>
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[11px] text-gray-400">Status:</span>
                                                        <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-wider ${
                                                            req.status === 'Dibatalkan oleh Konsumen' ? 'bg-red-500/20 text-red-400' : 'bg-gold-500/20 text-gold-400'
                                                        }`}>
                                                            {req.status}
                                                        </span>
                                                    </div>
                                                </div>
                                                {req.operatorNote && (
                                                    <div className="mt-3 p-2 rounded bg-dark-400 border-l-2 border-gold-500 text-[11px] text-gray-300 italic">
                                                        Note Operator: {req.operatorNote}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </section>
                    )}

                    {/* Featured Complexes */}
                    <section className="max-w-7xl mx-auto px-4 space-y-8">
                        <div className="text-center space-y-2">
                            <h2 className="font-serif text-3xl md:text-5xl font-bold text-white animate-fade-in">Komplek Perumahan Kami</h2>
                            <p className="text-gray-400 text-xs md:text-sm max-w-xl mx-auto font-sans">Pilih kawasan hunian paling prestisius dengan fasilitas prima.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {appState.complexes.filter(c => c.visible).map(complex => {
                                const soldOut = isComplexSoldOut(complex.id);
                                const compHouses = appState.houses.filter(h => h.complexId === complex.id && h.active);
                                const availablePlotsCount = complex.plotsAvailable || 0;

                                return (
                                    <div key={complex.id} className={`glass-panel rounded-2xl overflow-hidden gold-border transition-all flex flex-col justify-between group ${soldOut ? 'opacity-80 saturate-50' : ''}`}>
                                        <div className="h-64 overflow-hidden relative bg-dark-400 cursor-pointer" onClick={() => { setSelectedComplexId(complex.id); setView('complex-detail'); }}>
                                            <RenderPremiumImage src={complex.image} mode="landscape" alt={complex.name} />
                                            {soldOut && (
                                                <div className="absolute inset-0 bg-black/75 flex items-center justify-center z-10">
                                                    <span className="bg-red-600 border border-red-500 text-white font-extrabold px-6 py-2.5 rounded-full text-sm uppercase tracking-widest shadow-lg animate-pulse font-serif">
                                                        SOLD OUT
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-6 space-y-4 flex-1 flex flex-col justify-between font-sans">
                                            <div className="space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <h3 className="font-serif text-xl font-bold text-white cursor-pointer hover:text-gold-500 transition-colors animate-fade-in" onClick={() => { setSelectedComplexId(complex.id); setView('complex-detail'); }}>{complex.name}</h3>
                                                    <span className="text-xs text-gold-500 font-bold"><i className="fas fa-map-marker-alt"></i> {complex.location}</span>
                                                </div>
                                                <p className="text-xs text-gray-400 leading-relaxed">{complex.desc}</p>
                                                <div className="grid grid-cols-2 gap-4 pt-3 border-t border-gold-500/10 text-xs text-gray-400">
                                                    <div><i className="fas fa-home text-gold-500 mr-1.5"></i> {compHouses.length} Tipe Rumah</div>
                                                    <div><i className="fas fa-th text-gold-500 mr-1.5"></i> {availablePlotsCount} Kavling Tersedia</div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col gap-2">
                                                <button 
                                                    disabled={soldOut}
                                                    onClick={() => { setSelectedComplexId(complex.id); setView('complex-detail'); }}
                                                    className={`w-full py-2.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all ${
                                                        soldOut 
                                                            ? 'bg-dark-200 text-gray-600 cursor-not-allowed border border-gray-800 opacity-50' 
                                                            : 'btn-primary-gold'
                                                    }`}
                                                >
                                                    {soldOut ? 'Habis Terjual (Pilih Ditutup)' : 'Pilih Komplek Ini'}

        function DesignRoomSelectionView({ 
            house, roomConfig, roomSlotSelections, setRoomSlotSelections, appState,
            userSession, setUserSession, requests, setRequests,
            onBack, setView, triggerAlert, triggerConfirm, hasCustomizations, Disclaimer
        }) {
            const [activeSlotId, setActiveSlotId] = useState('');
            const [opNotes, setOpNotes] = useState('');
            const [opStyle, setOpStyle] = useState('Modern Minimalis');
            const [opImage, setOpImage] = useState(null);

            // Construct expected layout slots
            const requiredSlots = [];
            for (let i = 1; i <= roomConfig.bedroomQty; i++) {
                requiredSlots.push({ id: `kt-${i}`, label: `Kamar Tidur ${i}`, category: 'kamar-tidur' });
            }
            for (let i = 1; i <= roomConfig.bathroomQty; i++) {
                requiredSlots.push({ id: `km-${i}`, label: `Kamar Mandi ${i}`, category: 'kamar-mandi' });
            }
            requiredSlots.push({ id: 'dp-1', label: 'Dapur', category: 'dapur' });
            requiredSlots.push({ id: 'rt-1', label: 'Ruang Tamu', category: 'ruang-tamu' });
            requiredSlots.push({ id: 'rk-1', label: 'Ruang Keluarga', category: 'ruang-keluarga' });

            roomConfig.extraRooms.forEach((room, index) => {
                requiredSlots.push({ id: `ext-${index}`, label: room, category: 'ruangan-tambahan', customName: room });
            });

            useEffect(() => {
                if (requiredSlots.length > 0 && !activeSlotId) {
                    setActiveSlotId(requiredSlots[0].id);
                }
            }, [requiredSlots]);

            const currentActiveSlot = requiredSlots.find(s => s.id === activeSlotId) || requiredSlots[0];

            useEffect(() => {
                if (currentActiveSlot) {
                    const sel = roomSlotSelections[currentActiveSlot.id] || {};
                    setOpNotes(sel.notes || '');
                    setOpStyle(sel.style || 'Modern Minimalis');
                    setOpImage(sel.image || null);
                }
            }, [activeSlotId]);

            // Filter room designs SPECIFIC to this house and active slot category
            const matchingDesigns = currentActiveSlot 
                ? appState.designs.filter(d => d.houseId === house.id && d.category === currentActiveSlot.category && d.active)
                : [];

            const totalRequired = requiredSlots.length;
            const filledCount = requiredSlots.filter(s => !!roomSlotSelections[s.id]).length;
            const progressPercent = totalRequired > 0 ? Math.round((filledCount / totalRequired) * 100) : 0;

            useEffect(() => {
                if (progressPercent === 100 && totalRequired > 0) {
                    triggerAlert('Semua desain ruangan sudah lengkap.', 'success');
                }
            }, [progressPercent]);

            const handleSelectWebsiteDesign = (slotId, design) => {
                const selectionObj = {
                    method: 'website',
                    designId: design.id,
                    designName: design.name,
                    image: design.image,
                    desc: design.desc,
                    displayMode: design.displayMode || 'landscape'
                };
                setRoomSlotSelections(prev => ({ ...prev, [slotId]: selectionObj }));
            };

            const handleSaveOperatorDesign = (e) => {
                if (e) e.preventDefault();
                const selectionObj = {
                    method: 'operator',
                    designName: 'Diserahkan ke Operator',
                    notes: opNotes,
                    style: opStyle,
                    image: opImage,
                    displayMode: 'landscape'
                };
                setRoomSlotSelections(prev => ({ ...prev, [currentActiveSlot.id]: selectionObj }));
                triggerAlert('Konsep desain berhasil diserahkan ke Operator.');
            };

            const handleRegisterUser = (e) => {
                e.preventDefault();
                const name = e.target.userName.value.trim();
                const phone = e.target.userPhone.value.trim();

                if (!name) { triggerAlert('Nama wajib diisi', 'error'); return; }
                if (!phone || isNaN(phone)) { triggerAlert('Nomor telepon wajib angka', 'error'); return; }
                if (phone.length < 10) { triggerAlert('Nomor telepon minimal 10 digit', 'error'); return; }

                setUserSession({ name, phone });
                triggerAlert('Data diri Anda berhasil didaftarkan!');
            };

            const handleSubmitRequest = () => {
                if (progressPercent < 100) {
                    triggerAlert('Semua ruangan wajib dipilih metode desainnya.', 'error');
                    return;
                }
                if (!userSession) {
                    triggerAlert('Silakan lengkapi pendaftaran data diri terlebih dahulu.', 'error');
                    return;
                }

                const cleanPhone = userSession.phone.replace(/\D/g, '');
                const activeStatuses = ['Menunggu', 'Diproses', 'Disetujui'];
                const hasActiveRequest = requests.some(req => 
                    req.customerPhone === cleanPhone && 
                    activeStatuses.includes(req.status)
                );

                if (hasActiveRequest) {
                    triggerAlert("Nomor ini sudah digunakan untuk request aktif.", "error");
                    return;
                }

                const newReq = {
                    id: 'REQ-' + Date.now(),
                    date: new Date().toLocaleDateString('id-ID'),
                    customerName: userSession.name,
                    customerPhone: cleanPhone,
                    houseId: house.id,
                    houseName: house.name,
                    spec: {
                        bedrooms: roomConfig.bedroomQty,
                        bathrooms: roomConfig.bathroomQty,
                        extraRooms: roomConfig.extraRooms
                    },
                    selections: roomSlotSelections,
                    status: 'Menunggu',
                    operatorNote: ''
                };

                setRequests(prev => [newReq, ...prev]);
                triggerAlert('Request perencanaan hunian berhasil dikirim!');
                setView('home');

                    </div>

                    <div className="flex flex-col lg:flex-row gap-8 items-start relative">
                        {/* Main selection area */}

                                                {currentActiveSlot.label} {currentActiveSlot.customName ? `(${currentActiveSlot.customName})` : ''}
                                            </h3>
                                        </div>
                                    </div>

                                    {/* Default Options Showcase */}
                                    {matchingDesigns.length > 0 ? (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                {matchingDesigns.map(design => {

                                                    const isSelected = currentSel.method === 'website' && currentSel.designId === design.id;
                                                    
                                                    const imgContainerStyle = design.displayMode === 'portrait' 
                                                        ? 'aspect-[4/5]'

                                                        ? 'aspect-square'

                                                    return (

                                                            <div className={`overflow-hidden relative bg-dark-400 flex items-center justify-center ${imgContainerStyle}`}>

                                                                {design.premium && (

                                                                {isSelected && (

                                                                <button

                                                                        isSelected ? 'bg-gold-500 text-dark-400' : 'bg-dark-200 text-gold-500 gold-border hover:bg-gold-500/10'
                                                                    }`}
                                                                >
                                                                    {isSelected ? 'Desain Dipilih' : 'Pilih Desain Ini'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ) : (
                                        // Empty design slot warning
                                        <div className="glass-panel rounded-xl p-8 border border-dashed border-gold-500/30 text-center space-y-4 max-w-lg mx-auto bg-dark-300">
                                            <i className="fas fa-magic text-gold-500 text-4xl animate-pulse"></i>
                                            <div className="space-y-1">
