                                                <p className="text-xs text-gray-400 font-sans">Silakan serahkan deskripsi kebutuhan kustom kepada operator untuk didesain khusus.</p>
                                            </div>
                                            <button 
                                                onClick={() => {
                                                    setOpStyle('Modern Minimalis');
                                                    setOpNotes('Serahkan konsep pengerjaan kustom ini langsung ke operator.');
                                                    handleSaveOperatorDesign();
                                                }} 
                                                className="btn-primary-gold px-6 py-2 rounded text-xs uppercase tracking-wider font-bold"
                                            >
                                                ✔ Serahkan ke Operator
                                            </button>
                                        </div>
                                    )}

                                    {/* Alternate custom styling submission form */}
                                    <div className="pt-6 border-t border-gold-500/10 space-y-4">
                                        <div className="text-center">
                                            <p className="text-xs text-gray-400">Masih belum menemukan desain yang sesuai keinginan Anda?</p>
                                        </div>
                                        <div className="bg-dark-300 p-5 rounded-xl border border-gold-500/10 space-y-4 max-w-xl mx-auto">
                                            <h4 className="font-serif text-sm font-bold text-gold-500 uppercase tracking-wider flex items-center gap-1.5 justify-center">
                                                <i className="fas fa-user-edit"></i> Deskripsi Custom Untuk Operator
                                            </h4>
                                            <div className="space-y-4">
                                                <Input 
                                                    label="Style Desain yang Diinginkan" 
                                                    type="select" 
                                                    value={opStyle} 
                                                    onChange={(e) => setOpStyle(e.target.value)} 
                                                    options={[
                                                        { value: 'Modern Minimalis', label: 'Modern Minimalis' },
                                                        { value: 'Elegant Gold', label: 'Elegant Gold' },
                                                        { value: 'Warm Luxury', label: 'Warm Luxury' },
                                                        { value: 'Japandi', label: 'Japandi' },
                                                        { value: 'Scandinavian', label: 'Scandinavian' },
                                                        { value: 'Classic Modern', label: 'Classic Modern' }
                                                    ]} 
                                                />
                                                <Input 
                                                    label="Deskripsi / Catatan Kebutuhan Desain" 
                                                    type="textarea" 
                                                    value={opNotes} 
                                                    onChange={(e) => setOpNotes(e.target.value)}

                                                    rows={3}

                                        <div className="pt-4 border-t border-gold-500/10">
                                            <Disclaimer area="desain-ruangan" appState={appState} />
                                        </div>

                                </div>

                        </div>

                        {/* Sticky status sidebar overlay */}
                        <div className="w-full lg:w-80 lg:sticky lg:top-24 space-y-4 shrink-0 z-30">

                                    <span className="text-[9px] text-gold-500 font-bold uppercase tracking-widest font-sans">Progress Perencanaan</span>
                                    <div className="text-3xl font-serif font-bold text-white mt-1">{progressPercent}%</div>
                                </div>
                                <div className="w-full bg-dark-300 h-1.5 rounded-full overflow-hidden border border-gold-500/10">
                                    <div className="bg-gradient-gold h-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
                                </div>

                                <div className="space-y-1.5 max-h-64 overflow-y-auto pr-1">
                                    {requiredSlots.map(slot => {
                                        const selectionObj = roomSlotSelections[slot.id];
                                        const isSelected = !!selectionObj;
                                        const isActive = activeSlotId === slot.id;

                                        let displayStatus = '✖ Belum memilih desain';
                                        let statusColor = 'text-red-400';
                                        if (isSelected) {
                                            if (selectionObj.method === 'website') {
                                                displayStatus = '✔ Menggunakan desain website';
                                                statusColor = 'text-gold-500 font-medium';
                                            } else {
                                                displayStatus = '✔ Diserahkan ke operator';
                                                statusColor = 'text-amber-500 font-medium';

                                        }

                                        return (
                                            <button

                                                className={`w-full p-2.5 rounded-lg text-left text-[11px] flex flex-col gap-1 transition-all ${

                                                        ? 'bg-gold-500/15 border border-gold-500 text-gold-500 font-bold' 
                                                        : 'bg-dark-300 border border-transparent text-gray-400 hover:border-gold-500/10'
                                                }`}

                                                <span className="font-semibold text-white font-sans">{slot.label} {slot.customName ? `(${slot.customName})` : ''}</span>
                                                <span className={`text-[9px] font-sans ${statusColor}`}>{displayStatus}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                            <div className="glass-panel p-5 rounded-xl space-y-4">
                                {!userSession ? (

                                            <p className="text-xs font-bold text-white font-sans">{userSession.name}</p>

                                        >

        function MiamartView({ appState, cart, setCart, userSession, triggerAlert, setView }) {

            const formatRupiah = (num) => "Rp " + Number(num || 0).toLocaleString('id-ID');

            const filteredProducts = (appState.miamartProducts || []).filter(p => p.active).filter(p => {
                const text = `${p.name} ${p.description} ${p.category}`.toLowerCase();
                const matchesSearch = text.includes(search.toLowerCase());
                const matchesCategory = selectedCategory === 'Semua' || p.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const addToCart = (product) => {
                const existing = cart.find(item => item.product.id === product.id);
                if (existing) {
                    if (existing.quantity >= product.stock) { triggerAlert('Stok produk tidak mencukupi.', 'error'); return; }
                    setCart(cart.map(item => item.product.id === product.id ? { ...item, quantity: item.quantity + 1 } : item));
                } else {
                    setCart([...cart, { product, quantity: 1 }]);
                }
                triggerAlert(`${product.name} dimasukkan ke keranjang.`);
            };

            const updateCartQuantity = (productId, amount) => {
                const existing = cart.find(item => item.product.id === productId);
                if (!existing) return;
                const newQty = existing.quantity + amount;
                if (newQty <= 0) setCart(cart.filter(item => item.product.id !== productId));
                else {
                    if (newQty > existing.product.stock) { triggerAlert('Stok tidak mencukupi.', 'error'); return; }
                    setCart(cart.map(item => item.product.id === productId ? { ...item, quantity: newQty } : item));
                }
            };

            const cartTotal = cart.reduce((acc, item) => {
                const price = item.product.promoPrice > 0 ? item.product.promoPrice : item.product.price;
                return acc + (price * item.quantity);
            }, 0);

            const handleCheckout = (method) => {

                        <input type="text" placeholder="Cari beras, sabun, telur..." value={search} onChange={(e) => setSearch(e.target.value)} className="bg-dark-300 border border-gold-500/20 rounded-lg py-2 px-3 text-white text-xs focus:outline-none w-full" />

        function ConsumerLoginView({ appState, userSession, consumerSessions, deviceId, onLoginSuccess, onLogout, onBack, triggerAlert }) {
            const [step, setStep] = useState('form');
            const [name, setName] = useState(userSession?.name || '');
            const [phone, setPhone] = useState(userSession?.displayPhone || displayPhoneNumber(userSession?.phone || ''));
            const [otpCode, setOtpCode] = useState('');
            const [otpInput, setOtpInput] = useState('');
            const [rememberDevice, setRememberDevice] = useState(true);

            const activeSession = userSession ? consumerSessions.find(s => s.phone === normalizePhoneNumber(userSession.phone) && s.deviceId === deviceId && s.status === 'online') : null;

            const startVerification = (e) => {
                e.preventDefault();
                const cleanPhone = normalizePhoneNumber(phone);
                if (!name.trim()) { triggerAlert('Nama konsumen wajib diisi.', 'error'); return; }
                if (!cleanPhone || cleanPhone.length < 11) { triggerAlert('Nomor WhatsApp tidak valid.', 'error'); return; }
                const activeOtherDevice = (consumerSessions || []).find(s => s.phone === cleanPhone && s.status === 'online' && s.expiresAt > Date.now() && s.deviceId !== deviceId);
                if (activeOtherDevice) {
                    triggerAlert('Akun sedang digunakan di perangkat lain.', 'error');
                    return;
                }
                const code = String(Math.floor(100000 + Math.random() * 900000));
                setOtpCode(code);
                setStep('otp');
            };

            const verifyOtp = (e) => {
                e.preventDefault();
                if (otpInput.trim() !== otpCode) {
                    triggerAlert('Kode OTP tidak sesuai.', 'error');
                    return;
                }
                onLoginSuccess({ name: name.trim(), phone: normalizePhoneNumber(phone), rememberDevice });
            };

            return (
                <div className="min-h-[75vh] flex items-center justify-center px-4 py-12 animate-fade-in font-sans">
                    <div className="glass-panel rounded-3xl border border-gold-500/20 p-6 md:p-8 max-w-xl w-full space-y-6 shadow-2xl">
                        <button onClick={onBack} className="text-xs text-gold-500 hover:text-white transition-colors"><i className="fas fa-arrow-left mr-1"></i> Kembali</button>
                        <div className="text-center space-y-2">
                            <i className="fab fa-whatsapp text-5xl text-gold-500"></i>
                            <h1 className="font-serif text-2xl md:text-3xl font-bold text-white">Login Konsumen</h1>
                            <p className="text-xs text-gray-400">Masuk menggunakan nomor WhatsApp. Satu akun hanya bisa aktif di satu perangkat sampai logout.</p>
                        </div>

                        {userSession && activeSession ? (
                            <div className="space-y-4">
                                <div className="bg-gold-500/10 border border-gold-500/20 rounded-2xl p-4 text-center space-y-1">
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest">Session Aktif</p>
                                    <p className="font-serif text-lg font-bold text-white">{userSession.name}</p>
                                    <p className="text-xs text-gold-500">{displayPhoneNumber(userSession.phone)}</p>
                                    <p className="text-[10px] text-gray-500">Perangkat: {activeSession.deviceName} • ID: {activeSession.deviceId}</p>
                                </div>
                                <button onClick={() => onLogout()} className="w-full bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/30 py-3 rounded-lg text-xs uppercase font-bold transition-all">Logout Konsumen</button>
                            </div>
                        ) : step === 'form' ? (
                            <form onSubmit={startVerification} className="space-y-4">
                                <Input label="Nama Lengkap" value={name} onChange={(e) => setName(e.target.value)} placeholder="Nama konsumen" required />
                                <Input label="Nomor WhatsApp" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="0821..." required />
                                <label className="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
                                    <input type="checkbox" checked={rememberDevice} onChange={(e) => setRememberDevice(e.target.checked)} className="accent-gold-500" />
                                    Ingat perangkat ini dan aktifkan auto login
                                </label>
                                <button type="submit" className="w-full btn-primary-gold py-3 rounded-lg text-xs uppercase font-bold">Kirim OTP WhatsApp</button>
                                <p className="text-[10px] text-gray-500 leading-relaxed text-center">Catatan: verifikasi OTP di file HTML statis ini berjalan sebagai simulasi front-end. Untuk OTP WhatsApp sungguhan dan proteksi multi-device lintas perangkat, hubungkan ke backend/WhatsApp Business API.</p>
                            </form>
                        ) : (
                            <form onSubmit={verifyOtp} className="space-y-4">
                                <div className="bg-dark-300 border border-gold-500/15 rounded-2xl p-4 text-center space-y-2">
                                    <p className="text-[10px] text-gray-400 uppercase tracking-widest">Kode OTP Demo</p>
                                    <p className="font-serif text-3xl font-bold text-gold-500 tracking-[0.3em]">{otpCode}</p>
                                    <p className="text-[10px] text-gray-500">Masukkan kode ini untuk menyelesaikan verifikasi.</p>
                                </div>
                                <Input label="Masukkan OTP" value={otpInput} onChange={(e) => setOtpInput(e.target.value)} placeholder="6 digit OTP" required />
                                <div className="grid grid-cols-2 gap-3">
                                    <button type="button" onClick={() => setStep('form')} className="btn-secondary-gold py-3 rounded-lg text-xs uppercase font-bold">Ubah Nomor</button>
                                    <button type="submit" className="btn-primary-gold py-3 rounded-lg text-xs uppercase font-bold">Verifikasi</button>
                                </div>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        function AdminAboutManager({ localState, setLocalState, triggerAlert, triggerConfirm }) {
            const [sectionForm, setSectionForm] = useState({ id: null, title: '', text: '', image: '', displayMode: 'landscape', active: true, order: (localState.aboutSections || []).length + 1 });

            const resetSection = () => setSectionForm({ id: null, title: '', text: '', image: '', displayMode: 'landscape', active: true, order: (localState.aboutSections || []).length + 1 });
            const saveSection = (e) => {
                e.preventDefault();
                if (!sectionForm.title.trim() || !sectionForm.text.trim()) { triggerAlert('Judul dan tulisan section wajib diisi.', 'error'); return; }
                let sections = [...(localState.aboutSections || [])];
                if (sectionForm.id) sections = sections.map(s => s.id === sectionForm.id ? { ...sectionForm } : s);
                else sections.push({ ...sectionForm, id: 'about-sec-' + Date.now() });
                setLocalState(p => ({ ...p, aboutSections: sections }));
                resetSection();
                triggerAlert('Section Tentang Kami disimpan ke draft.');
            };
            const moveSection = (id, dir) => {
                const sections = [...(localState.aboutSections || [])].sort((a, b) => (a.order || 0) - (b.order || 0));
                const idx = sections.findIndex(s => s.id === id);
                const target = idx + dir;
                if (idx < 0 || target < 0 || target >= sections.length) return;
                const tempOrder = sections[idx].order;
                sections[idx].order = sections[target].order;
                sections[target].order = tempOrder;
                setLocalState(p => ({ ...p, aboutSections: sections }));
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <h2 className="font-serif text-xl font-bold text-gold-500">Kelola Tentang Kami</h2>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass-panel p-5 rounded-xl border border-gold-500/15 space-y-4">
                            <h3 className="font-serif text-sm font-bold text-white uppercase tracking-wider">Tulisan Utama</h3>
                            <Input label="Judul Tentang Kami" value={localState.aboutTitle || ''} onChange={(e) => setLocalState(p => ({ ...p, aboutTitle: e.target.value }))} />
                            <Input label="Profil Perusahaan" type="textarea" value={localState.aboutDesc || ''} onChange={(e) => setLocalState(p => ({ ...p, aboutDesc: e.target.value }))} rows={3} />
                            <Input label="Visi Perusahaan" type="textarea" value={localState.aboutVisi || ''} onChange={(e) => setLocalState(p => ({ ...p, aboutVisi: e.target.value }))} rows={2} />
                            <Input label="Misi Perusahaan" type="textarea" value={localState.aboutMisi || ''} onChange={(e) => setLocalState(p => ({ ...p, aboutMisi: e.target.value }))} rows={2} />
                            <Input label="Sejarah Perusahaan" type="textarea" value={localState.aboutSejarah || ''} onChange={(e) => setLocalState(p => ({ ...p, aboutSejarah: e.target.value }))} rows={3} />
                            <Input label="Slogan Perusahaan" value={localState.slogan || ''} onChange={(e) => setLocalState(p => ({ ...p, slogan: e.target.value }))} />
                        </div>
                        <div className="glass-panel p-5 rounded-xl border border-gold-500/15 space-y-4">
                            <h3 className="font-serif text-sm font-bold text-white uppercase tracking-wider">Foto & Background</h3>
                            <ImageUpload onImageSelected={(img) => setLocalState(p => ({ ...p, aboutBanner: img }))} currentImage={localState.aboutBanner} labelPreset="Upload Banner Tentang Kami" />
                            <Input label="Mode Banner" type="select" value={localState.aboutBannerMode || 'landscape'} onChange={(e) => setLocalState(p => ({ ...p, aboutBannerMode: e.target.value }))} options={[{value:'landscape',label:'Landscape'}, {value:'portrait',label:'Portrait'}, {value:'auto-fit',label:'Auto Fit'}, {value:'square',label:'Square'}]} />
                            <ImageUpload onImageSelected={(img) => setLocalState(p => ({ ...p, aboutBackground: img }))} currentImage={localState.aboutBackground} labelPreset="Upload Background Section" />
                            <ImageUpload onImageSelected={(img) => setLocalState(p => ({ ...p, aboutProjectImg: img }))} currentImage={localState.aboutProjectImg} labelPreset="Upload Gambar Proyek" />
                            <ImageUpload onImageSelected={(img) => setLocalState(p => ({ ...p, aboutOfficeImg: img }))} currentImage={localState.aboutOfficeImg} labelPreset="Upload Gambar Kantor" />
                        </div>
                    </div>

                    <div className="glass-panel p-5 rounded-xl border border-gold-500/15 space-y-5">
                        <h3 className="font-serif text-sm font-bold text-white uppercase tracking-wider">Tambah / Edit Section Baru</h3>
                        <form onSubmit={saveSection} className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                            <div className="space-y-3">
                                <Input label="Judul Section" value={sectionForm.title} onChange={(e) => setSectionForm(p => ({ ...p, title: e.target.value }))} />
                                <Input label="Tulisan Section" type="textarea" value={sectionForm.text} onChange={(e) => setSectionForm(p => ({ ...p, text: e.target.value }))} rows={4} />
                                <div className="grid grid-cols-2 gap-3">
                                    <Input label="Urutan" type="number" value={sectionForm.order} onChange={(e) => setSectionForm(p => ({ ...p, order: parseInt(e.target.value) || 1 }))} />
                                    <Input label="Mode Foto" type="select" value={sectionForm.displayMode} onChange={(e) => setSectionForm(p => ({ ...p, displayMode: e.target.value }))} options={[{value:'landscape',label:'Landscape'}, {value:'portrait',label:'Portrait'}, {value:'auto-fit',label:'Auto Fit'}, {value:'square',label:'Square'}]} />
                                </div>
                                <label className="flex items-center gap-2 text-xs text-gray-400"><input type="checkbox" checked={sectionForm.active} onChange={(e) => setSectionForm(p => ({ ...p, active: e.target.checked }))} className="accent-gold-500" />Tampilkan section</label>
                                <div className="grid grid-cols-2 gap-3"><button type="button" onClick={resetSection} className="btn-secondary-gold py-2 rounded text-xs uppercase font-bold">Reset</button><button type="submit" className="btn-primary-gold py-2 rounded text-xs uppercase font-bold">Simpan Section</button></div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {[...(localState.aboutSections || [])].sort((a,b)=>(a.order||0)-(b.order||0)).map(sec => (
                                <div key={sec.id} className="bg-dark-300 p-3 rounded-xl border border-gold-500/10 flex gap-3 items-center">
                                    <div className="w-16 h-16 rounded-lg overflow-hidden bg-dark-400 shrink-0"><RenderPremiumImage src={sec.image} mode="square" alt="" /></div>
                                    <div className="flex-1 min-w-0"><p className="text-xs font-bold text-white truncate">{sec.title}</p><p className="text-[10px] text-gray-500 truncate">Urutan {sec.order} • {sec.active ? 'Aktif' : 'Disembunyikan'}</p></div>
                                    <div className="flex gap-1">
                                        <button onClick={() => moveSection(sec.id, -1)} className="text-gold-500 text-xs"><i className="fas fa-arrow-up"></i></button>
                                        <button onClick={() => moveSection(sec.id, 1)} className="text-gold-500 text-xs"><i className="fas fa-arrow-down"></i></button>
                                        <button onClick={() => setSectionForm(sec)} className="text-blue-400 text-xs"><i className="fas fa-edit"></i></button>
                                        <button onClick={() => triggerConfirm('Hapus section ini?', () => setLocalState(p => ({ ...p, aboutSections: p.aboutSections.filter(x => x.id !== sec.id) })))} className="text-red-400 text-xs"><i className="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

                id: null,
                title: '',
                text: '',
                type: 'warning',
                mode: 'inline',
                area: 'rumah',
                active: true,
                icon: 'fa-exclamation-triangle',
                color: '#F1C40F',
                size: 'md',
                buttonText: 'Lanjutkan'
            });
            const [isAddingDisclaimer, setIsAddingDisclaimer] = useState(false);

            const [pwdOld, setPwdOld] = useState('');
            const [pwdNew, setPwdNew] = useState('');
            const [pwdConfirm, setPwdConfirm] = useState('');
            const [showPwdFields, setShowPwdFields] = useState(false);

            useEffect(() => {
                setLocalState({ ...appState });
            }, [appState]);

                setIsSaving(true);
                setTimeout(() => {
                    setAppState({ ...localState });
                    setIsSaving(false);
                    triggerAlert("Perubahan berhasil disimpan.");
                }, 800);
            };

            const handleSaveDisclaimer = (e) => {
                e.preventDefault();
                if (!disclaimerForm.title.trim() || !disclaimerForm.text.trim()) {
                    triggerAlert('Judul dan isi teks wajib diisi.', 'error');
                    return;
                }

                let list = [...(localState.disclaimers || [])];
                const activeForm = { 
                    ...disclaimerForm, 
                    version: disclaimerForm.id ? (list.find(x => x.id === disclaimerForm.id)?.version || 1) + 1 : 1 
                };

                if (disclaimerForm.id) {
                    list = list.map(d => d.id === disclaimerForm.id ? activeForm : d);

                }

                    id: null,
                    title: '',
                    text: '',
                    type: 'warning',
                    mode: 'inline',
                    area: 'rumah',
                    active: true,
                    icon: 'fa-exclamation-triangle',
                    color: '#F1C40F',
                    size: 'md',

                });

                triggerAlert('Disclaimer disimpan ke draf. Klik Simpan Perubahan.');

                    triggerAlert('Nama komplek dan foto utama wajib dilengkapi!', 'error');
                    return;

                let updatedComplexes = [...(localState.complexes || [])];
                if (complexForm.id) {
                    updatedComplexes = updatedComplexes.map(c => c.id === complexForm.id ? { ...complexForm } : c);
                } else {
                    const newComp = { ...complexForm, id: 'complex-' + Date.now() };
                    updatedComplexes.push(newComp);
                }

                triggerAlert('Komplek disimpan ke draf. Silakan klik Simpan Perubahan.');
            };

                e.preventDefault();
                if (!houseForm.complexId) {
                    triggerAlert('Silakan pilih komplek untuk tipe rumah ini!', 'error');
                    return;
                }
                if (!houseForm.name.trim() || !houseForm.price.trim() || !houseForm.image) {
                    triggerAlert('Nama rumah, harga, dan foto wajib dilengkapi!', 'error');
                    return;
                }

                let updatedHouses = [...(localState.houses || [])];
                if (houseForm.id) {
                    updatedHouses = updatedHouses.map(h => h.id === houseForm.id ? { ...houseForm } : h);
                } else {
                    const newHouseObj = { ...houseForm, id: 'house-' + Date.now() };
                    updatedHouses.push(newHouseObj);
                }

                setLocalState(p => ({ ...p, houses: updatedHouses }));
                setHouseForm({ id: null, complexId: '', name: '', price: '', land: '', building: '', bed: 2, bath: 1, desc: '', image: '', banner: '', active: true, displayMode: 'landscape' });

                triggerAlert('Hunian disimpan ke draf. Silakan klik Simpan Perubahan.');
            };

                e.preventDefault();
                if (!selectedComplexForPlots) {
                    triggerAlert('Pilih Komplek terlebih dahulu!', 'error');
                    return;
                }
                if (!plotForm.kavling.trim() || !plotForm.size.trim() || !plotForm.price.trim()) {
                    triggerAlert('Lengkapi data kavling!', 'error');
                    return;
                }

                let updatedPlots = [...(localState.plots || [])];
                const cleanPlotForm = { ...plotForm, complexId: selectedComplexForPlots };
                if (plotForm.id) {
                    updatedPlots = updatedPlots.map(p => p.id === plotForm.id ? cleanPlotForm : p);
                } else {
                    const newPlot = { ...cleanPlotForm, id: 'plot-' + Date.now() };
                    updatedPlots.push(newPlot);

                                                                    checked={disc.active} 
                                                                    onChange={(e) => {
                                                                        const updated = (localState.disclaimers || []).map(d => d.id === disc.id ? { ...d, active: e.target.checked } : d);
                                                                        setLocalState(p => ({ ...prev, disclaimers: updated }));
                                                                    }} 
                                                                    className="sr-only peer" 
                                                                />
                                                                <div className="w-11 h-6 bg-dark-100 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-gray-300 after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gold-500"></div>
                                                            </label>
                                                        </div>
                                                        <h4 className="font-serif font-bold text-white text-sm truncate">{disc.title}</h4>
                                                        <p className="text-[10px] text-gray-400 line-clamp-3 leading-relaxed">{disc.text}</p>
                                                        <div className="grid grid-cols-2 gap-2 text-[9px] text-gray-500 uppercase tracking-wider font-semibold pt-1 border-t border-gray-800">
                                                            <span>Mode: {disc.mode}</span>
                                                            <span>Type: {disc.type}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-end gap-3 mt-4 border-t border-gray-800 pt-2 text-xs font-bold uppercase">
                                                        <button 
                                                            type="button" 
                                                            onClick={() => { setDisclaimerForm({ ...disc }); setIsAddingDisclaimer(true); }} 
                                                            className="text-gold-500 hover:underline"
                                                        >
                                                            Edit
                                                        </button>
                                                        <button 
                                                            type="button" 
                                                            onClick={() => {
                                                                triggerConfirm(`Hapus disclaimer "${disc.title}"?`, () => {
                                                                    const updated = (localState.disclaimers || []).filter(d => d.id !== disc.id);
                                                                    setLocalState(p => ({ ...prev, disclaimers: updated }));
                                                                    triggerAlert('Disclaimer dihapus dari draf.');
                                                                });
                                                            }} 
                                                            className="text-red-500 hover:underline"
                                                        >
                                                            Hapus
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* TAB: BRANDING */}
                            {dashboardTab === 'branding' && (
                                <div className="space-y-6 animate-fade-in">
                                    <h2 className="font-serif text-xl font-bold text-gold-500">Kelola Beranda & Logo Perusahaan</h2>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="glass-panel p-5 rounded-xl border border-gold-500/15 space-y-4">
                                            <h3 className="font-serif text-sm font-bold text-white uppercase tracking-wider">Teks Slogan & Banner</h3>
                                            <Input label="Slogan Utama" value={localState.slogan} onChange={(e) => setLocalState(p => ({ ...p, slogan: e.target.value }))} />
                                            <div className="space-y-1.5">
                                                <label className="block text-xs font-semibold text-gold-500 uppercase">Banner Utama Hero</label>
                                                <ImageUpload onImageSelected={(img) => setLocalState(p => ({ ...p, heroImage: img }))} currentImage={localState.heroImage} />
                                            </div>
                                        </div>
                                        <div className="glass-panel p-5 rounded-xl border border-gold-500/15 space-y-4">
                                            <h3 className="font-serif text-sm font-bold text-white uppercase tracking-wider">Logo Perusahaan (Transparansi PNG/SVG/WEBP)</h3>
                                            <ImageUpload onImageSelected={(img) => setLocalState(p => ({ ...p, logo: img }))} currentImage={localState.logo} isLogo={true} />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: SECURITY PASSWORD */}
                            {dashboardTab === 'security' && (
                                <div className="space-y-6 animate-fade-in font-sans">
                                    <h2 className="font-serif text-xl font-bold text-gold-500">Pengaturan Password Operator</h2>
                                    <div className="glass-panel p-6 rounded-xl border border-gold-500/15 max-w-lg space-y-4">
                                        <form onSubmit={handlePasswordChange} className="space-y-4">
                                            <Input 
                                                label="Password Lama" 
                                                type="password" 
                                                value={pwdOld} 
                                                onChange={(e) => setPwdOld(e.target.value)} 
                                                placeholder="Ketik password saat ini..." 
                                                required 
                                            />
                                            <Input 
                                                label="Password Baru (Min 6 Karakter)" 
                                                type="password" 
                                                value={pwdNew} 
                                                onChange={(e) => setPwdNew(e.target.value)} 
                                                placeholder="Ketik password baru..." 
                                                required 
                                            />
                                            <Input 
                                                label="Konfirmasi Password Baru" 
                                                type="password" 
                                                value={pwdConfirm} 
                                                onChange={(e) => setPwdConfirm(e.target.value)} 
                                                placeholder="Ketik ulang password baru..." 
                                                required 
                                            />
                                            <button type="submit" className="w-full btn-primary-gold py-2 rounded text-xs uppercase font-bold">Ganti Password Operator</button>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
